<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconectando — Sem Medo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Canvas de confetes (overlay) -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Decorações flutuantes (bolinhas e estrelas) -->
    <div class="decoracoes">
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco"></div>
        <div class="deco deco-star"></div>
        <div class="deco deco-star"></div>
        <div class="deco deco-star"></div>
        <div class="deco deco-star"></div>
    </div>

    <!-- Botão Fullscreen -->
    <button id="btn-fullscreen" title="Tela cheia (F)" aria-label="Tela cheia">⛶</button>

    <!-- TELA INICIAL -->
    <section id="tela-inicio" class="tela ativa">
        <div class="container fade-in">
            <h1 class="titulo-principal bounce">Reconectando<br>Sem Medo</h1>
            <p class="subtitulo">Desafios, perguntas e muita diversão!</p>
            <button id="btn-comecar" class="btn btn-grande pulse">Começar!</button>
        </div>
    </section>

    <!-- TELA DE CONFIGURAÇÃO DAS EQUIPES -->
    <section id="tela-setup" class="tela">
        <div class="container fade-in">
            <h2 class="titulo-setup">Nossas Equipes!</h2>
            <div id="setup-equipes-container" class="setup-equipes"></div>
            <button id="btn-adicionar-equipe" class="btn btn-adicionar">+ Adicionar Equipe</button>
            <button id="btn-iniciar" class="btn btn-grande pulse">Iniciar Quiz</button>
        </div>
    </section>

    <!-- TELA DE PERGUNTA -->
    <section id="tela-pergunta" class="tela">
        <!-- Placar fixo no topo -->
        <div id="placar-topo"></div>

        <!-- Conteúdo da pergunta -->
        <div class="pergunta-conteudo">
            <div class="pergunta-texto fade-in" id="pergunta-texto"></div>

            <!-- Mensagem de status -->
            <div class="status-msg" id="status-msg"></div>

            <!-- Painéis de seleção de equipe -->
            <div id="paineis-equipe" class="paineis-equipe"></div>

            <!-- Alternativas -->
            <div class="alternativas" id="alternativas"></div>

            <!-- Botão Próxima -->
            <button id="btn-proxima" class="btn btn-proxima" style="display:none;">Próxima →</button>
        </div>
    </section>

    <!-- TELA FINAL -->
    <section id="tela-final" class="tela">
        <div class="container fade-in">
            <div id="resultado-destaque"></div>
            <div class="placar-final" id="placar-final"></div>
            <button id="btn-reiniciar" class="btn btn-grande pulse">Jogar Novamente</button>
        </div>
    </section>

    <script src="js/questions.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/confetti.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
